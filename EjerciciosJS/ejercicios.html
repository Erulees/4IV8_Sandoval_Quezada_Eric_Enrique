<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Ejercicios JS</title>

    <link rel="stylesheet" href="./CssEjercicios/ejercicios.css">
</head>
<body>

    <header>
        <h1>Formulario de Ejercicios JavaScript</h1>
    </header>

    <main class="container">

        <!-- EJERCICIO 1 -->
        <article class="form-container">
            <h2>Cálculo de Interés</h2>

            <p>Ingresa los datos solicitados:</p>

            <input type="number" id="capital" placeholder="Capital invertido">
            <input type="number" id="meses" placeholder="Cantidad de meses">

            <button onclick="calcularInteres()">Resolver</button>

            <div id="res1" class="resultado"></div>
        </article>

        <!-- EJERCICIO 2 -->
        <article class="form-container">
            <h2>Sueldo más Comisión</h2>

            <input type="number" id="sueldo" placeholder="Sueldo base">
            <input type="number" id="venta1" placeholder="Venta número 1">
            <input type="number" id="venta2" placeholder="Venta número 2">
            <input type="number" id="venta3" placeholder="Venta número 3">

            <button onclick="calcularSueldo()">Resolver</button>

            <div id="res2" class="resultado"></div>
        </article>

        <!-- EJERCICIO 3 -->
        <article class="form-container">
            <h2>Compra con Rebaja</h2>

            <input type="number" id="compra" placeholder="Monto total">

            <button onclick="calcularDescuento()">Resolver</button>

            <div id="res3" class="resultado"></div>
        </article>

        <!-- EJERCICIO 4 -->
        <article class="form-container">
            <h2>Calificación Definitiva</h2>

            <input type="number" id="p1" placeholder="Primer parcial">
            <input type="number" id="p2" placeholder="Segundo parcial">
            <input type="number" id="p3" placeholder="Tercer parcial">
            <input type="number" id="examen" placeholder="Examen final">
            <input type="number" id="trabajo" placeholder="Trabajo final">

            <button onclick="calcularCalificacion()">Resolver</button>

            <div id="res4" class="resultado"></div>
        </article>

        <!-- EJERCICIO 5 -->
        <article class="form-container">
            <h2>Porcentaje del Grupo</h2>

            <input type="number" id="hombres" placeholder="Cantidad de hombres">
            <input type="number" id="mujeres" placeholder="Cantidad de mujeres">

            <button onclick="calcularPorcentajes()">Resolver</button>

            <div id="res5" class="resultado"></div>
        </article>

        <!-- EJERCICIO 6 -->
        <article class="form-container">
            <h2>Edad Actual</h2>

            <input type="number" id="anioNacimiento" placeholder="Año de nacimiento">

            <button onclick="calcularEdad()">Resolver</button>

            <div id="res6" class="resultado"></div>
        </article>

    </main>

    <div class="container-footer">
        <footer>
            <a href="../index.html">Ir al menú principal</a>
        </footer>
    </div>

    <script src="./JSEjercicios/Ejercicios.js"></script>

</body>
</html>
